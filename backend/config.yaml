  resume_summary: |
    PhD student in Computer Science at Texas A&M University (advised by Dr. Marcus Botacin),
    specializing in LLM post-training, curriculum learning, and evaluation infrastructure for
    cyberdefense. Trained models from 140M to 26B parameters (incl. sparse MoE) on up to
    16 H100 GPUs using DeepSpeed, FSDP, and CUDA. Built end-to-end post-training pipelines
    (YaraGen — USENIX Security 2026 in prep) and alignment-focused curriculum fine-tuning
    (Ambiguity-Aware Research Agent, Gemma-4-26B). Designed custom eval frameworks
    (Brownie & Puff: BLEU + Parsing + SAT semantics) and GPT-4o user-simulation eval.
    Seeking internships in LLM post-training, alignment, or evaluation at frontier AI labs.

